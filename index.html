<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الوميض لتوصيل الطلبات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font-body:'Cairo',sans-serif;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --text-2xl:clamp(1.8rem,1rem + 2vw,2.8rem);
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;
  --radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}
:root,[data-theme="light"]{
  --color-bg:#f4f6fa;--color-surface:#ffffff;--color-surface-2:#f0f3f9;
  --color-border:oklch(0.3 0.05 240/0.12);
  --color-text:#1a2340;--color-text-muted:#5a6480;--color-text-faint:#a0a8be;
  --color-primary:#1a3a7c;--color-primary-hover:#122d62;
  --color-accent:#f5820a;--color-accent-hover:#d96e00;
  --color-primary-light:#e8eef8;--color-accent-light:#fff4e6;
  --shadow-sm:0 1px 3px oklch(0.3 0.1 240/0.08);
  --shadow-md:0 4px 14px oklch(0.3 0.1 240/0.12);
  --shadow-lg:0 12px 32px oklch(0.3 0.1 240/0.16);
}
[data-theme="dark"]{
  --color-bg:#0f1422;--color-surface:#161d30;--color-surface-2:#1c2438;
  --color-border:oklch(0.8 0.05 240/0.1);
  --color-text:#d8dff0;--color-text-muted:#7a84a0;--color-text-faint:#454d66;
  --color-primary:#4a78d4;--color-primary-hover:#6090e0;
  --color-accent:#f5820a;--color-accent-hover:#ffa040;
  --color-primary-light:#1a2540;--color-accent-light:#2a1a08;
  --shadow-sm:0 1px 3px oklch(0 0 0/0.2);
  --shadow-md:0 4px 14px oklch(0 0 0/0.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.4);
}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;scroll-padding-top:70px}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);
  color:var(--color-text);background:var(--color-bg);line-height:1.6}
img{display:block;max-width:100%;height:auto}
button,a{cursor:pointer;transition:color var(--transition),background var(--transition),
  box-shadow var(--transition),transform var(--transition)}
a{text-decoration:none;color:inherit}
/* NOTE: This is a partial upload due to encoding issues in the original file */
/* Please upload the full index.html file directly via git push */
</style>
</head>
<body>
<p style="text-align:center;padding:2rem;font-family:Cairo,sans-serif;direction:rtl">
يرجى رفع الملف مباشرة عبر git لأن الملف الأصلي يحتوي على مشكلة في الترميز.
</p>
</body>
</html>
